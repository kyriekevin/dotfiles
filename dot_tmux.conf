# tmux config for optional multi-agent work. Ghostty native tabs/splits remain
# the default terminal workflow; tmux is for when you want one dashboard across
# several long-running Claude/Codex sessions.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"
set -g focus-events on
set -g mouse on
set -g history-limit 50000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 10
set -g set-clipboard on
set -g allow-passthrough on

# Use C-a so Ghostty can keep C-s as its native chord prefix outside tmux.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind m resize-pane -Z
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Activity should be visible at a glance while agents run elsewhere.
set -g monitor-activity on
set -g visual-activity on
set -g visual-bell on
setw -g monitor-activity on

# Catppuccin Mocha-inspired status line, kept dependency-free.
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "bg=#f9e2af,fg=#11111b"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
set -g window-status-current-style "bg=#89b4fa,fg=#11111b,bold"
set -g window-status-activity-style "bg=#f9e2af,fg=#11111b,bold"
set -g window-status-bell-style "bg=#f38ba8,fg=#11111b,bold"
set -g status-left-length 40
set -g status-left " #[fg=#a6e3a1,bold]#S #[fg=#585b70]|"
set -g status-right-length 80
set -g status-right "#[fg=#585b70]| #[fg=#cba6f7]#{pane_current_path} #[fg=#585b70]| #[fg=#f9e2af]%H:%M "
